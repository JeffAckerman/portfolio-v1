    <script>
      // Apply saved theme before first paint to avoid a flash of the wrong mode.
      ;(function () {
        try {
          if (localStorage.getItem('theme') === 'light')
            document.documentElement.setAttribute('data-theme', 'light')
        } catch (e) {}
      })()
    </script>
    <!-- TODO (low): self-host Clash Display/Satoshi/JetBrains Mono as woff2 and
         preload them — removes the render-blocking third-party font CSS -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Async font CSS: avoids render-blocking the LCP; font-display:swap
         shows fallback text immediately -->
    <link
      href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&f[]=satoshi@400,500,700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
